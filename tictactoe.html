<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; color: #eee;
    flex-direction: column; gap: 24px;
  }
  h1 { font-size: 2rem; letter-spacing: 2px; }
  #status {
    font-size: 1.2rem; min-height: 1.5em;
    transition: color 0.3s;
  }
  #board {
    display: grid; grid-template-columns: repeat(3, 120px);
    grid-template-rows: repeat(3, 120px); gap: 6px;
  }
  .cell {
    background: #16213e; border: none; border-radius: 8px;
    font-size: 3rem; font-weight: 700; color: #eee;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  .cell:hover:not(.taken) { background: #1a3a5c; transform: scale(1.05); }
  .cell.x { color: #e94560; }
  .cell.o { color: #0f3460; }
  .cell.win { background: #e94560; color: #fff; }
  #restart {
    padding: 10px 32px; font-size: 1rem; border: 2px solid #e94560;
    background: transparent; color: #e94560; border-radius: 6px;
    cursor: pointer; transition: background 0.2s;
  }
  #restart:hover { background: #e94560; color: #fff; }
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div id="status">Your turn (X)</div>
<div id="board"></div>
<button id="restart">Restart</button>
<script>
const board = document.getElementById('board');
const status = document.getElementById('status');
const restartBtn = document.getElementById('restart');
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let cells, state, gameOver;

function init() {
  board.innerHTML = '';
  state = Array(9).fill('');
  gameOver = false;
  status.textContent = 'Your turn (X)';
  cells = [];
  for (let i = 0; i < 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'cell';
    btn.addEventListener('click', () => play(i));
    board.appendChild(btn);
    cells.push(btn);
  }
}

function check(mark) {
  for (const [a, b, c] of wins) {
    if (state[a] === mark && state[b] === mark && state[c] === mark) return [a, b, c];
  }
  return null;
}

function play(i) {
  if (gameOver || state[i]) return;
  set(i, 'X');
  let w = check('X');
  if (w) return endGame('You win!', w);
  if (state.every(c => c)) return endGame("It's a draw!");
  aiMove();
}

function set(i, mark) {
  state[i] = mark;
  cells[i].textContent = mark;
  cells[i].classList.add('taken', mark.toLowerCase());
}

function aiMove() {
  // Try to win, then block, then center, then corner, then any
  let move = findBest('O') ?? findBest('X') ?? tryCell(4) ?? tryCorner() ?? firstEmpty();
  if (move === null) return;
  set(move, 'O');
  let w = check('O');
  if (w) return endGame('AI wins!', w);
  if (state.every(c => c)) return endGame("It's a draw!");
  status.textContent = 'Your turn (X)';
}

function findBest(mark) {
  for (const [a, b, c] of wins) {
    const vals = [state[a], state[b], state[c]];
    if (vals.filter(v => v === mark).length === 2 && vals.includes('')) {
      return [a, b, c][vals.indexOf('')];
    }
  }
  return null;
}
function tryCell(i) { return state[i] === '' ? i : null; }
function tryCorner() { return [0,2,6,8].find(i => !state[i]) ?? null; }
function firstEmpty() { return state.indexOf(''); }

function endGame(msg, winCells) {
  gameOver = true;
  status.textContent = msg;
  if (winCells) winCells.forEach(i => cells[i].classList.add('win'));
}

restartBtn.addEventListener('click', init);
init();
</script>
</body>
</html>
